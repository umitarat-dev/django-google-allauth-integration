{% extends 'users/base.html' %}
{% load socialaccount %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-6 col-lg-5">
        <div class="custom-card">
            <h3 class="text-center fw-bold mb-4">Create an Account</h3>

            <form action="" method="post" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-warning text-dark w-100 fw-bold py-2 mt-3 shadow">
                    Register
                </button>
            </form>
   
            <div class="position-relative text-center my-4">
                <hr class="text-white-50">
                <span class="position-absolute top-50 start-50 translate-middle px-3 small fw-bold text-white-50" style="background: #19163e; border-radius: 20px;">OR</span>
            </div>
            
            <form action="{% provider_login_url 'google' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-light fw-bold w-100 py-2 shadow d-flex align-items-center justify-content-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-google text-danger" viewBox="0 0 16 16">
                        <path d="M15.545 6.558a9.4 9.4 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0c2.158 0 4 .797 5.415 2.091l-2.391 2.391C10.01 3.551 9.105 3 8 3c-2.445 0-4.5 1.659-5.241 3.89A4.96 4.96 0 0 0 2 8c0 .393.047.777.139 1.147C2.9 11.378 4.954 13 8 13c1.609 0 2.926-.39 3.911-1.066a3.86 3.86 0 0 0 1.408-2.522H8V6.558z"/>
                    </svg>
                    <span class="text-dark">Sign up with Google</span>
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="text-white-50 small mb-0">
                    Already have an account? 
                    <a href="{% url 'user_login' %}" class="text-info fw-semibold text-decoration-none">Log In</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
